# YAML input for area-based randomizer WL/BL（ver1.21仕様）

kits:
  starter_land:
    - SPECIES_POOCHYENA
    - SPECIES_ZIGZAGOON
    - SPECIES_WURMPLE
    - SPECIES_TAILLOW
    - SPECIES_PIDGEY
    - SPECIES_SENTRET
    - SPECIES_RATTATA
    - SPECIES_HOOTHOOT
  starter_water:
    - SPECIES_MAGIKARP
    - SPECIES_LOTAD
    - SPECIES_POLIWAG
    - SPECIES_TENTACOOL
    - SPECIES_WINGULL
  mid_land:
    - SPECIES_LINOONE
    - SPECIES_SWELLOW
    - SPECIES_DUSTOX
    - SPECIES_BEAUTIFLY
    - SPECIES_FEAROW
    - SPECIES_NOCTOWL
  mid_water:
    - SPECIES_LUDICOLO
    - SPECIES_POLIWHIRL
    - SPECIES_GOLDUCK
    - SPECIES_PELIPPER
  late_land:
    - SPECIES_SLAKING
    - SPECIES_FEAROW
    - SPECIES_PIDGEOT
    - SPECIES_SWELLOW
    - SPECIES_SWALOT
  late_water:
    - SPECIES_GYARADOS
    - SPECIES_LAPRAS
    - SPECIES_STARMIE
    - SPECIES_WAILORD
  legend_unlock:
    - SPECIES_ARTICUNO
    - SPECIES_ZAPDOS
    - SPECIES_MOLTRES
    - SPECIES_LATIOS
    - SPECIES_LATIAS
  starter_trim:
    - SPECIES_POOCHYENA
    - SPECIES_ZIGZAGOON
    - SPECIES_RATTATA
    - SPECIES_SENTRET

areas:
  route_101_land:
    key: { mapGroup: MAP_GROUP(MAP_ROUTE101), mapNum: MAP_NUM(MAP_ROUTE101), areaMask: Land }
    slotMode: uniform
    maxSpecies: LAND_MAX_SLOTS
    maxRerolls: 6
    allowLegendOverride: false
    timeSlots:
      any:
        default: { apply: [starter_land], remove: null }
        rare:    { apply: null, remove: null, rareRate: null, rareSlots: null }

  route_102_land:
    key: { mapGroup: MAP_GROUP(MAP_ROUTE102), mapNum: MAP_NUM(MAP_ROUTE102), areaMask: Land }
    slotMode: uniform
    maxSpecies: LAND_MAX_SLOTS
    maxRerolls: 6
    allowLegendOverride: false
    timeSlots:
      any:
        default: { apply: [starter_land, mid_land], remove: [starter_trim] }
        rare:    { apply: null, remove: null, rareRate: null, rareSlots: null }

  route_102_fishing:
    key: { mapGroup: MAP_GROUP(MAP_ROUTE102), mapNum: MAP_NUM(MAP_ROUTE102), areaMask: Fish }
    slotMode: uniform
    maxSpecies: FISH_MAX_SLOTS
    maxRerolls: 6
    allowLegendOverride: false
    timeSlots:
      any:
        allowEmpty: true
        fishing:
          old:
            slotMode: uniform
            maxSpecies: 2
            maxRerolls: 6
            default: { apply: [starter_water], remove: null }
            rare:    { apply: null, remove: null, rareRate: null, rareSlots: null }
          good:
            slotMode: uniform
            maxSpecies: 5
            maxRerolls: 6
            default: { apply: [starter_water, mid_water], remove: null }
            rare:    { apply: null, remove: null, rareRate: null, rareSlots: null }
          super:
            slotMode: uniform
            maxSpecies: 5
            maxRerolls: 6
            default: { apply: [starter_water, late_water], remove: null }
            rare:    { apply: null, remove: null, rareRate: null, rareSlots: null }

  route_103_land:
    key: { mapGroup: MAP_GROUP(MAP_ROUTE103), mapNum: MAP_NUM(MAP_ROUTE103), areaMask: Land }
    slotMode: uniform
    maxSpecies: LAND_MAX_SLOTS
    maxRerolls: 3
    allowLegendOverride: false
    timeSlots:
      morning:
        default: { apply: [legend_unlock], remove: null }
        rare:    { apply: null, remove: null, rareRate: null, rareSlots: null }
      day:
        default: { apply: [starter_land, mid_land], remove: [starter_trim] }
        rare:    { apply: null, remove: null, rareRate: null, rareSlots: null }
      evening:
        default: { apply: [starter_land, mid_land], remove: [starter_trim] }
        rare:    { apply: null, remove: null, rareRate: null, rareSlots: null }
      night:
        default: { apply: [mid_land], remove: null }
        rare:    { apply: null, remove: null, rareRate: null, rareSlots: null }

  route_103_fishing:
    key: { mapGroup: MAP_GROUP(MAP_ROUTE103), mapNum: MAP_NUM(MAP_ROUTE103), areaMask: Fish }
    slotMode: uniform
    maxSpecies: FISH_MAX_SLOTS
    maxRerolls: 6
    allowLegendOverride: false
    timeSlots:
      morning:
        allowEmpty: true
        fishing:
          old:
            slotMode: uniform
            maxSpecies: 2
            maxRerolls: 6
            default: { apply: [starter_water], remove: null }
            rare:    { apply: null, remove: null, rareRate: null, rareSlots: null }
          good:
            slotMode: uniform
            maxSpecies: 5
            maxRerolls: 6
            default: { apply: [starter_water, mid_water], remove: null }
            rare:    { apply: null, remove: null, rareRate: null, rareSlots: null }
          super:
            slotMode: uniform
            maxSpecies: 5
            maxRerolls: 6
            default: { apply: [starter_water, late_water], remove: null }
            rare:    { apply: null, remove: null, rareRate: null, rareSlots: null }
      day:
        allowEmpty: true
        fishing:
          old:   { default: null, rare: null, maxRerolls: null, maxSpecies: null }
          good:  { default: null, rare: null, maxRerolls: null, maxSpecies: null }
          super: { default: null, rare: null, maxRerolls: null, maxSpecies: null }
      evening:
        allowEmpty: true
        fishing:
          old:   { default: null, rare: null, maxRerolls: null, maxSpecies: null }
          good:  { default: null, rare: null, maxRerolls: null, maxSpecies: null }
          super: { default: null, rare: null, maxRerolls: null, maxSpecies: null }
      night:
        allowLegendOverride: true
        allowEmpty: true
        fishing:
          old:
            slotMode: uniform
            maxSpecies: 2
            maxRerolls: 6
            default: { apply: [starter_water], remove: null }
            rare:    { apply: null, remove: null, rareRate: null, rareSlots: null }
          good:
            slotMode: uniform
            maxSpecies: 4
            maxRerolls: 6
            default: { apply: [mid_water], remove: null }
            rare:    { apply: null, remove: null, rareRate: null, rareSlots: null }
          super:
            slotMode: uniform
            maxSpecies: 5
            maxRerolls: 6
            allowLegendOverride: true
            default: { apply: [legend_unlock], remove: [starter_water, mid_water, late_water] }
            rare:    { apply: null, remove: null, rareRate: null, rareSlots: null }

  route_110_water:
    key: { mapGroup: MAP_GROUP(MAP_ROUTE110), mapNum: MAP_NUM(MAP_ROUTE110), areaMask: Water }
    slotMode: uniform
    maxSpecies: WATER_MAX_SLOTS
    maxRerolls: 6
    allowLegendOverride: false
    timeSlots:
      any:
        default: { apply: [starter_water], remove: null }
        rare:    { apply: null, remove: null, rareRate: null, rareSlots: null }

  route_121_land:
    key: { mapGroup: MAP_GROUP(MAP_ROUTE121), mapNum: MAP_NUM(MAP_ROUTE121), areaMask: Land }
    slotMode: uniform
    maxSpecies: LAND_MAX_SLOTS
    maxRerolls: 8
    allowLegendOverride: false
    timeSlots:
      any:
        default: { apply: [starter_land, mid_land, late_land], remove: [starter_trim] }
        rare:    { apply: null, remove: null, rareRate: null, rareSlots: null }

  route_128_water:
    key: { mapGroup: MAP_GROUP(MAP_ROUTE128), mapNum: MAP_NUM(MAP_ROUTE128), areaMask: Water }
    slotMode: uniform
    maxSpecies: WATER_MAX_SLOTS
    maxRerolls: 8
    allowLegendOverride: true
    timeSlots:
      any:
        default: { apply: [starter_water, mid_water, late_water, legend_unlock], remove: null }
        rare:    { apply: null, remove: null, rareRate: null, rareSlots: null }

gifts:
  default:
    key: { mapGroup: 0xFF, mapNum: 0xFF, areaMask: Gift }
    slotMode: uniform
    maxSpecies: 6
    maxRerolls: 6
    allowLegendOverride: false
    timeSlots:
      any:
        default: { apply: [starter_land, starter_water], remove: null }
        rare:    { apply: null, remove: null, rareRate: null, rareSlots: null }
